name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, for example v1.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x64
          - os: ubuntu-latest
            target: linux
            arch: arm64
          - os: windows-latest
            target: win
            arch: x64
          - os: windows-latest
            target: win
            arch: ia32
          - os: macos-latest
            target: mac
            arch: x64
          - os: macos-latest
            target: mac
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static app
        run: npm run export

      - name: Build Electron binaries
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Windows artifacts are published for GitHub Releases and future winget submission.
      # This project does not use paid app-store packaging by default.

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CredStore-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.yml
            !dist/**/*.blockmap
            !dist/builder-debug.yml
            !dist/builder-effective-config.yaml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: release-artifacts/**/*
          generate_release_notes: true
